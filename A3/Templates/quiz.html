<!DOCTYPE html>
<html lang="en">
<head>
    <title>Quiz</title>
</head>
<body>
    <h1>Question {{ question_num }} of {{ total_questions }}</h1>
    <p>{{ question }}</p>

    <form method="POST">
        {% for option in options %}
            <input type="radio" name="answer" value="{{ option }}"> {{ option }}<br>
        {% endfor %}
        <br>

        <button type="submit" name="action" value="submit">Submit Answer</button>

        {% if can_use_fifty %}
            <button type="submit" name="action" value="fifty">Use 50/50</button>
        {% endif %}
    </form>
</body>
</html>
